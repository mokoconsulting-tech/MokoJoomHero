MOD_MOKO_HERO="Moko Hero"
MOD_MOKO_HERO_XML_DESCRIPTION="Displays a randomly selected image or video from a folder as the full-width background of a hero overlay section. Supports single random media or a pure-CSS crossfade slideshow. Built on Cassiopeia's banner overlay pattern with configurable height, overlay colour and opacity, content alignment, and call-to-action button."

; Field labels
MOD_MOKO_HERO_FIELD_FOLDER_LABEL="Image Folder"
MOD_MOKO_HERO_FIELD_FOLDER_DESC="Select a subfolder inside /images/ that contains your hero images. A random image is chosen on each page load."
MOD_MOKO_HERO_FIELD_TITLE_LABEL="Hero Title"
MOD_MOKO_HERO_FIELD_TITLE_DESC="Main heading displayed over the hero image."
MOD_MOKO_HERO_FIELD_TEXT_LABEL="Hero Text"
MOD_MOKO_HERO_FIELD_TEXT_DESC="Supporting text displayed below the hero title. Basic HTML is allowed."
MOD_MOKO_HERO_FIELD_LINK_LABEL="Call-to-Action URL"
MOD_MOKO_HERO_FIELD_LINK_DESC="URL for the call-to-action button. Leave blank to hide the button."
MOD_MOKO_HERO_FIELD_LINK_TEXT_LABEL="Button Label"
MOD_MOKO_HERO_FIELD_LINK_TEXT_DESC="Text shown on the call-to-action button."

